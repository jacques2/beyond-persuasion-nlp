project:
  name: beyond-persuasion-nlp
  description: Context-aware conversational safeguards for emotionally vulnerable users.

affective:
  model_name: null
  use_transformers: false

ethics:
  primary_emotion_threshold: 0.60
  combined_emotion_threshold: 0.70
  minimum_confidence_for_flag: 0.55
  enable_guardrail: true
  mode: "rule_based"

llm:
  backend: "mock"
  model_path: null
  max_tokens: 256
  temperature: 0.3

evaluation:
  prompts_path: "data/evaluation/prompts.csv"
  outputs_dir: "artifacts/evaluation"
